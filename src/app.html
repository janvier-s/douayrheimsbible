<!doctype html>
<html lang="en" data-theme="auto">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="ODR Bible" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#a62c2c" />
		<link rel="alternate" type="application/rss+xml" title="Douay-Rheims Bible" href="/feed.xml" />
		<!-- Flash-free theme + reader settings: apply before first paint -->
		<script>
			(function () {
				var d = document.documentElement,
					s = d.style;
				var stored = localStorage.getItem('theme');
				d.setAttribute('data-theme', stored || 'auto');
				// Apply reader font size and line height before paint to prevent CLS
				try {
					var prefs = JSON.parse(localStorage.getItem('reading-prefs') || '{}');
					var fs = prefs.fontSize;
					if (!fs && window.matchMedia('(max-width: 767px)').matches) {
						fs = 15;
					}
					if (fs) s.setProperty('--font-size-reader', fs + 'px');
					if (prefs.lineHeight) s.setProperty('--line-height-reader', String(prefs.lineHeight));
					// Hide homepage before paint when user has opted to skip it
					if (prefs.skipHomepage && window.location.pathname === '/') {
						s.setProperty('visibility', 'hidden');
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
