<!doctype html>
<html lang="en" data-theme="auto">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="ODR Bible" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Flash-free theme: apply before first paint -->
		<script>
			(function () {
				const stored = localStorage.getItem('theme');
				document.documentElement.setAttribute('data-theme', stored || 'auto');
			})();
		</script>
		<!-- Reload recovery: if any /_app/immutable/ asset fails (stale prerendered HTML
		     with old chunk hashes), reload once to get fresh HTML. SessionStorage guard
		     prevents infinite loops. -->
		<script>
			(function () {
				if (sessionStorage.getItem('skit_reloaded')) {
					sessionStorage.removeItem('skit_reloaded');
					return;
				}
				document.addEventListener(
					'error',
					function (e) {
						var el = e.target;
						var url = (el && (el.href || el.src)) || '';
						if (url.indexOf('/_app/immutable/') !== -1) {
							sessionStorage.setItem('skit_reloaded', '1');
							window.location.reload();
						}
					},
					true
				);
			})();
		</script>
		<!-- Font preloads: critical reader + UI fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
			media="print"
			onload="this.media = 'all'"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
			/>
		</noscript>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
