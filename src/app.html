<!doctype html>
<html lang="en" data-theme="auto">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="ODR Bible" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#a62c2c" />
		<!-- Flash-free theme: apply before first paint -->
		<script>
			(function () {
				const stored = localStorage.getItem('theme');
				document.documentElement.setAttribute('data-theme', stored || 'auto');
			})();
		</script>
		<!-- Preload critical reader font (latin subset — covers most text) -->
		<link
			rel="preload"
			href="/fonts/LibreBaskerville-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
